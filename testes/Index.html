<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Instagram</title>
    </head>
    <body>
        <div class="instagram-wrapper">
            <div class="instagram-phone">
                <img src="./img/instagram-phone.png" alt="Phone">
            </div>
            <div class="instagram-continue">
                <div class="group">
                    <img src="./img/instagram-logo.png" alt="Instagram logo" width="300" height="200">
                    <div class="profile-photo">
                        <img src="./img/instagram-account.png" alt="Account photo">
                        <style>
                            .profile-photo img {
                                max-width: 500px;
                                max-height: 500px;
                            }
                        </style>
                    </div>
                    <a href="#" class="instagram-login">Continue as arthurgpcruz</a>
                    <a href="#" class="instagram-logout">Remove account</a>
                </div>
                <div class="group">
                    <p class="not-account">Not arthurgpcruz?</p>
                    <p class="not-account">
                        <span class="link-blue">Change account</span>
                        or
                        <span class="link-blue">Sign up</span>
                    </p>
                </div>
                <div class="get-the-app">
                    <p class="get-app">Get the app.</p>
                    <img src="./img/app-store-button.png" alt="Apple Store logo" width="200" height="100">
                    <img src="./img/google-play-button.png" alt="Google Play logo" width="200" height="100">
                    <div class="download">
                       <a href="#" class="app-download">get on app store</a> 
                       <a href="#" class="app-download">get on google play</a> 
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
